name: my_musics
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.10.7
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  audioplayers: ^6.7.1
  audio_service: ^0.18.12
  cached_network_image: ^3.4.1
  supabase_flutter: ^2.15.0
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  twilio_flutter: ^0.9.0
  flutter_launcher_icons: ^0.14.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_foreground: "assets/app_icon.png"
  # round_icon: true
